name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # CI gate — runs on every push and PR. Deploy depends on this.
  # ---------------------------------------------------------------
  ci:
    name: CI — lint, build, smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system libs for OpenCV
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff — fail on real errors only)
        run: ruff check --select E9,F63,F7,F82 app tests

      - name: Syntax compile check
        run: python -m py_compile $(find app tests -name '*.py')

      - name: Build frames from committed assets
        run: |
          bash deploy/build_frames.sh
          n=$(ls -1 frames | wc -l)
          echo "Built $n frames"
          test "$n" -ge 8

      - name: Cache rembg model
        uses: actions/cache@v4
        with:
          path: ~/.u2net
          key: rembg-isnet-general-use

      - name: Smoke test (app boots + endpoints respond)
        run: pytest -q

  # ---------------------------------------------------------------
  # CD — only on push to main, and only if CI passed.
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to AWS
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            echo ">> Pulling latest code, rebuilding, installing deps (as todozee)"
            sudo -u todozee bash -s <<'DEPLOY'
            set -e
            cd /opt/todozee/app
            git fetch --all --prune
            git reset --hard origin/main
            bash build_frames.sh
            .venv/bin/pip install --upgrade pip wheel >/dev/null
            .venv/bin/pip install -r requirements.txt
            DEPLOY
            echo ">> Restarting service"
            sudo systemctl restart todozee
            sleep 5
            echo ">> Health check"
            curl -fsS http://127.0.0.1:5016/ \
              || (sudo journalctl -u todozee -n 60 --no-pager; exit 1)
            echo ">> Deploy OK"

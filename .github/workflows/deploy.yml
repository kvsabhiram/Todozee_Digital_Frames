name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/todozee/app
            echo ">> Pulling latest code"
            sudo -u todozee git fetch --all --prune
            sudo -u todozee git reset --hard origin/main
            echo ">> Rebuilding frames/"
            sudo -u todozee bash build_frames.sh
            echo ">> Installing dependencies"
            sudo -u todozee .venv/bin/pip install --upgrade pip wheel >/dev/null
            sudo -u todozee .venv/bin/pip install -r requirements.txt
            echo ">> Restarting service"
            sudo systemctl restart todozee
            sleep 5
            echo ">> Health check"
            curl -fsS http://127.0.0.1:5016/ \
              || (sudo journalctl -u todozee -n 60 --no-pager; exit 1)
            echo ">> Deploy OK"
